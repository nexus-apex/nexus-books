{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Account | NexusBooks{% endblock %}
{% block page_title %}{% if editing %}Edit Account{% else %}New Account{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <select name="account_type">
          <option value="asset" {% if record.account_type == 'asset' %}selected{% endif %}>Asset</option>
          <option value="liability" {% if record.account_type == 'liability' %}selected{% endif %}>Liability</option>
          <option value="equity" {% if record.account_type == 'equity' %}selected{% endif %}>Equity</option>
          <option value="revenue" {% if record.account_type == 'revenue' %}selected{% endif %}>Revenue</option>
          <option value="expense" {% if record.account_type == 'expense' %}selected{% endif %}>Expense</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Code</label>
        <input type="text" name="code" value="{{ record.code|default:'' }}">
      </div>
      <div class="form-group">
        <label>Balance</label>
        <input type="number" step="0.01" name="balance" value="{{ record.balance|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea name="description">{{ record.description|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Account</button>
      <a href="/accounts/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
