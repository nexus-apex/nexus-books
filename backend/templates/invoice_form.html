{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Invoice | NexusBooks{% endblock %}
{% block page_title %}{% if editing %}Edit Invoice{% else %}New Invoice{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text" name="invoice_number" value="{{ record.invoice_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" name="customer_name" value="{{ record.customer_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Tax</label>
        <input type="number" step="0.01" name="tax" value="{{ record.tax|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="draft" {% if record.status == 'draft' %}selected{% endif %}>Draft</option>
          <option value="sent" {% if record.status == 'sent' %}selected{% endif %}>Sent</option>
          <option value="paid" {% if record.status == 'paid' %}selected{% endif %}>Paid</option>
          <option value="overdue" {% if record.status == 'overdue' %}selected{% endif %}>Overdue</option>
          <option value="void" {% if record.status == 'void' %}selected{% endif %}>Void</option>
        </select>
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" name="due_date" value="{{ record.due_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea name="notes">{{ record.notes|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Invoice</button>
      <a href="/invoices/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
